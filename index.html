<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KillCritic</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        .background {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .start-button {
            position: absolute;
            /* Положение кнопки.
               Если понадобится — просто меняй проценты */
            left: 8%;
            bottom: 14%;
            background: #c62828;
            color: white;
            text-decoration: none;
            font-size: 30px;
            font-weight: bold;
            padding: 18px 55px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,.35);
            transition: .25s;
        }

            .start-button:hover {
                background: #e53935;
                transform: scale(1.05);
            }

            .start-button:active {
                transform: scale(.98);
            }
    </style>

</head>

<body>

    <div class="container">

        <img src="img/start_screen.png"
             alt="KillCritic"
             class="background">

        <a href="password.html" class="start-button">
            НАЧАТЬ ИГРУ
        </a>

    </div>

</body>

</html>
