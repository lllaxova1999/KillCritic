<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
        }

        .login-box {
            width: 350px;
            padding: 35px;
            background: white;
            border: 4px solid #ffb6c1;
            border-radius: 20px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #444;
            font-size: 24px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ccc;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }

            input[type="password"]:focus {
                border-color: #ff69b4;
            }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #e53935;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }

            button:hover {
                background: #c62828;
            }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Введите пароль</h2>

        <input type="password" placeholder="Пароль">

        <button>Войти</button>
    </div>

</body>
</html>
