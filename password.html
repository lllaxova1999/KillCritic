<!DOCTYPE html>
<html lang="ru">

<head>

    <!-- Кодировка -->
    <meta charset="UTF-8">

    <!-- Для корректного отображения на телефонах -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Название вкладки браузера -->
    <title>Password</title>

    <!-- Подключаем файл со стилями -->
    <link rel="stylesheet" href="css/style.css">

</head>

<!-- Класс страницы нужен, чтобы в CSS задать именно этот фон -->
<body class="page password-page">

    <!-- Окно ввода пароля, в CSS задать стиль окна для ввода пароля -->
    <div class="login-box">

        <h2>Введите пароль</h2>

        <!-- Поле ввода пароля -->
        <input id="password"
               type="password"
               placeholder="Пароль">

        <!-- Кнопка проверки пароля -->
        <button class="button login-button"
                onclick="checkPassword()">

            ВОЙТИ

        </button>

    </div>

    <script>

        /* Правильный пароль */
        const correctPassword = "Qwerty54321";

        /* Функция вызывается после нажатия кнопки */
        function checkPassword() {

            /* Получаем текст, который ввел пользователь */
            const enteredPassword =
                document.getElementById("password").value;

            /* Проверяем пароль */
            if (enteredPassword === correctPassword) {

                /* Если пароль правильный — переходим на следующую страницу */
                window.location.href = "desktop / desktop.html";

            } else {

                /* Если пароль неверный — показываем сообщение */
                alert("Неверный пароль!");

            }

        }

    </script>

</body>

</html>
