<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password</title>

    <style>

        /* Сброс стандартных настроек браузера */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Страница */
        html, body {
            width: 100%; /* Ширина страницы */
            height: 100%; /* Высота страницы */
            overflow: hidden; /* Запрещает появление полос прокрутки */
            background: #000; /* Цвет фона - черный */
            font-family: Arial, Helvetica, sans-serif; /* Шрифт */
        }

        /* Фоновое изображение */
        .background {
            position: fixed; /* Приклеиваем изображение к окну браузера */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Заполняет весь экран без искажения */
            z-index: -1; /* Картинка находится под всеми элементами */
        }


        /* ОКНО ВВОДА ПАРОЛЯ */

        .login-box {
            position: absolute; /* Располагаем поверх картинки */
            left: 50%; /* По центру */
            transform: translateX(-50%);
            bottom: 50px; /* Отступ от нижнего края */
            width: 420px; /* Ширина окна */
            max-width: 90%; /* Если экран маленький (например телефон), окно станет уже */
            padding: 30px;
            background: rgba(20, 20, 20, 0.8); /* Полупрозрачный темный фон */
            border-radius: 20px; /* Скругление */
            border: 2px solid rgba(255,255,255,.2); /* Белая рамка */
            box-shadow: 0 12px 30px rgba(0,0,0,.5); /* Тень */
            text-align: center;
            color: white;
            backdrop-filter: blur(8px); /* Размытие картинки позади окна */
        }


        /* ЗАГОЛОВОК */

        h2 {
            margin-bottom: 25px;
            font-size: 28px;
        }


        /* ПОЛЕ ВВОДА */

        input[type="password"] {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            outline: none;
            margin-bottom: 20px;
        }


            /* Когда пользователь нажал на поле */

            input[type="password"]:focus {
                box-shadow: 0 0 12px #ff3b3b;
            }


        /* КНОПКА */

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #c62828;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: .25s;
        }


            /* Наведение мышкой */

            button:hover {
                background: #e53935;
                transform: scale(1.03);
            }


            /* Нажатие */

            button:active {
                transform: scale(.98);
            }
    </style>

</head>

<body>

    <!-- Фоновая картинка -->
    <img src="img/password.jpg"
         alt="Password"
         class="background">


    <!-- Окно ввода пароля -->
    <div class="login-box">

        <h2>Введите пароль</h2>

        <input type="password"
               placeholder="Пароль">

        <button>Войти</button>

    </div>

</body>

</html>
